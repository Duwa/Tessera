events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream gateway {
        server gateway:8000;
    }

    server {
        listen 80;

        # Redirect root to platform app
        location = / {
            return 301 /platform.html;
        }

        # Public career site
        location = /careers {
            root /usr/share/nginx/html;
            try_files /careers.html =404;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
        }

        # Public recruiting API — no auth, direct to recruiting service
        location /public/ {
            proxy_pass http://recruiting:8019/public/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
        }

        # Serve frontend HTML files
        location / {
            root /usr/share/nginx/html;
            index platform.html;
            try_files $uri $uri/ /platform.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
        }

        # CPN WebSocket — bypass gateway, direct to governance service
        location /ws/cpn {
            proxy_pass http://governance:8008/cpn/stream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # SSE live stream — bypass gateway (streaming not proxied through it)
        location /api/v1/trace/live {
            proxy_pass http://trace:8010/live;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            add_header X-Accel-Buffering no;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # Proxy all other /api calls to the gateway
        location /api/ {
            proxy_pass http://gateway/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PATCH, DELETE";
            add_header Access-Control-Allow-Headers "Content-Type";
        }

        # Health check
        location /health {
            proxy_pass http://gateway/health;
        }

        # Demo seed endpoint (at gateway root, not under /api/)
        location /demo/ {
            proxy_pass http://gateway/demo/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
        }

        # Signal feed (at gateway root)
        location /signals {
            proxy_pass http://gateway/signals;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
        }

        # HAV aggregation pipeline (at gateway root)
        location /aggregate-hav {
            proxy_pass http://gateway/aggregate-hav;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
        }

        # Customer onboarding import
        location /import/ {
            proxy_pass http://gateway/import/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
        }
    }
}
